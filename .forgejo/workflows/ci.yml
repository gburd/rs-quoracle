name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: docker
    container:
      image: rust:1-bookworm
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install components
        run: rustup component add rustfmt clippy

      - name: Install CBC solver
        run: |
          apt-get update
          apt-get install -y coinor-libcbc-dev coinor-libclp-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build examples
        run: |
          cargo build --example simple
          cargo build --example tutorial
          cargo build --example search

      - name: Test with CBC solver
        run: cargo test --no-default-features --features cbc
